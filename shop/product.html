<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchandise — RB19</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/shop.css" />
</head>
<body data-page="shop-product">
  <nav>
    <a class="nav-link mono" href="/">HOME</a>
    <a class="nav-link mono" href="/shop/index.html">MERCHANDISE</a>
    <a class="nav-link mono" href="#" id="nav-cart">CART <span id="cart-count">0</span></a>
  </nav>

  <main class="shop-main">
    <div class="shop-crumbs mono">
      <a href="/shop/index.html">Merchandise</a>
      <span class="sep">/</span>
      <a href="/shop/index.html" id="crumb-category"></a>
      <span class="sep">/</span>
      <span class="current" id="crumb-current"></span>
    </div>

    <div class="shop-detail">
      <div class="shop-detail-image">
        <img id="detail-image" src="" alt="" />
      </div>
      <div class="shop-detail-info">
        <span class="mono shop-detail-cat" id="detail-cat"></span>
        <h1 id="detail-name"></h1>
        <div class="shop-detail-price" id="detail-price"></div>
        <p class="shop-detail-desc" id="detail-desc"></p>
        <button class="shop-cta" id="add-to-cart">Add to Cart</button>
        <span class="mono shop-added-note" id="added-note">Added to cart</span>
      </div>
    </div>

    <section class="shop-related">
      <h2>More from this collection</h2>
      <div class="shop-product-grid" id="related-grid"></div>
    </section>
  </main>

  <footer>
    <div class="footer-links mono">
      <a href="/">HOME</a>
      <a href="#" id="footer-cart">CART</a>
    </div>
    <span class="mono footer-disclaimer">UNOFFICIAL FAN TRIBUTE — NOT AFFILIATED WITH RED BULL RACING OR FORMULA 1</span>
  </footer>

  <script type="module" src="/src/shop.js"></script>
</body>
</html>
